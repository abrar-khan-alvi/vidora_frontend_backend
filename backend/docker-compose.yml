services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vidora}
      POSTGRES_USER: ${POSTGRES_USER:-vidora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vidora}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vidora}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    # Not published to the host — web/worker reach it at redis:6379 internally
    # (avoids colliding with other local Redis containers).
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media:/app/media
    ports:
      - "8001:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A vidora worker -l info --concurrency=2
    volumes:
      - .:/app
      - media:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  media:
