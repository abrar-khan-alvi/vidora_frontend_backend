# Reverse proxy for the API. TLS uses a Cloudflare Origin Certificate (Full
# (strict) mode). Replace api.YOURDOMAIN.com with your real API subdomain and
# drop the cert files in backend/nginx/certs/ (origin.pem + origin.key).

server {
    listen 80;
    server_name api.YOURDOMAIN.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.YOURDOMAIN.com;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;

    # Allow large video/audio uploads to the editor.
    client_max_body_size 200M;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}
